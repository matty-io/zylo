spring:
  application:
    name: zylo-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/zylo}
    username: ${DATABASE_USERNAME:zylo}
    password: ${DATABASE_PASSWORD:zylo_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-must-be-at-least-32-characters}
  access-token-expiry: 15m
  refresh-token-expiry: 30d

# Twilio Configuration
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  verify-service-sid: ${TWILIO_VERIFY_SERVICE_SID:}
  enabled: ${TWILIO_ENABLED:false}

# Razorpay Configuration
razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

# Firebase Configuration
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
  enabled: ${FIREBASE_ENABLED:false}

# App Configuration
app:
  otp:
    length: 6
    expiry-minutes: 5
  booking:
    lock-timeout-seconds: 30
    pending-expiry-minutes: 10
    skip-payment: true  # Demo mode: auto-confirm bookings without payment
  slots:
    duration-minutes: 60
    start-hour: 6
    end-hour: 23

# Logging
logging:
  level:
    root: INFO
    com.zylo: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

---
spring:
  config:
    activate:
      on-profile: dev

twilio:
  enabled: false

firebase:
  enabled: false

---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: WARN
    com.zylo: INFO
    org.hibernate.SQL: WARN
